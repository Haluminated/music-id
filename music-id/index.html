<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music ID</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 340px;
      text-align: center;
    }

    .orb {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 20px auto;
      background: #222;
      cursor: pointer;
      transition: 0.3s;
    }

    .orb.on {
      background: #00ff88;
      box-shadow: 0 0 30px #00ff88;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .card {
      display: none;
      margin-top: 20px;
      background: #111;
      padding: 14px;
      border-radius: 14px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .status {
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="app">

    <h2>Music ID</h2>

    <div class="orb" id="orb" onclick="toggle()"></div>

    <div class="status" id="status">Tap to start</div>

    <div class="card" id="card">
      <img id="cover">
      <h2 id="song"></h2>
      <p id="artist"></p>
    </div>

  </div>

<script>
let stream;
let recorder;
let running = false;
let interval;
let last = "";

async function toggle() {
  running ? stop() : start();
}

async function start() {
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = async (e) => {
    const res = await fetch("/api/recognise", {
      method: "POST",
      body: e.data
    });

    const data = await res.json();
    if (!data.result) return;

    const id = data.result.title + data.result.artist;
    if (id === last) return;
    last = id;

    document.getElementById("card").style.display = "block";
    document.getElementById("song").innerText = data.result.title;
    document.getElementById("artist").innerText = data.result.artist;
    document.getElementById("cover").src = data.result.image || "";
  };

  recorder.start();

  interval = setInterval(() => {
    recorder.stop();
    recorder.start();
  }, 6000);

  running = true;
  orb.classList.add("on");
  status.innerText = "Listening...";
}

function stop() {
  clearInterval(interval);
  recorder.stop();
  stream.getTracks().forEach(t => t.stop());

  running = false;
  orb.classList.remove("on");
  status.innerText = "Stopped";
}

const orb = document.getElementById("orb");
const status = document.getElementById("status");
</script>

</body>
</html>
